<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mediora — Medical Records</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#137fec", "background-light": "#f6f7f8" },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light text-slate-900 font-display antialiased">
    <div class="relative flex h-screen w-full flex-row overflow-hidden bg-background-light">
        <!-- Sidebar -->
        <aside class="flex h-full w-64 flex-col border-r border-slate-200 bg-white">
            <div class="flex h-full flex-col justify-between p-4">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-3 px-2 py-2">
                        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
                            <span class="material-symbols-outlined text-2xl">local_hospital</span>
                        </div>
                        <h1 class="text-slate-900 text-lg font-bold leading-normal">Mediora</h1>
                    </div>
                    <nav class="flex flex-col gap-2">
                        <a class="flex items-center gap-3 rounded-lg px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors"
                            href="/dashboard.html">
                            <span class="material-symbols-outlined">dashboard</span>
                            <p class="text-sm font-medium leading-normal">Dashboard</p>
                        </a>
                        <a class="flex items-center gap-3 rounded-lg px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors"
                            href="/booking.html">
                            <span class="material-symbols-outlined">calendar_month</span>
                            <p class="text-sm font-medium leading-normal">Appointments</p>
                        </a>
                        <a class="flex items-center gap-3 rounded-lg bg-primary/10 px-3 py-3 text-primary"
                            href="/records.html">
                            <span class="material-symbols-outlined fill-1">description</span>
                            <p class="text-sm font-medium leading-normal">Medical Records</p>
                        </a>
                        <a class="flex items-center gap-3 rounded-lg px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors"
                            href="/billing.html">
                            <span class="material-symbols-outlined">credit_card</span>
                            <p class="text-sm font-medium leading-normal">Billing</p>
                        </a>
                    </nav>
                </div>
                <button id="logout-btn"
                    class="flex w-full cursor-pointer items-center justify-center gap-2 rounded-lg bg-slate-100 py-3 text-slate-700 hover:bg-slate-200 transition-colors text-sm font-bold">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex flex-1 flex-col h-full overflow-y-auto bg-background-light">
            <header
                class="sticky top-0 z-10 flex w-full items-center justify-between border-b border-slate-200 bg-white px-8 py-4">
                <div class="flex items-center gap-4">
                    <h2 class="text-slate-900 text-xl font-bold leading-tight">Medical Records</h2>
                </div>
                <div class="flex items-center gap-6">
                    <button
                        class="relative flex h-10 w-10 items-center justify-center rounded-full bg-slate-50 text-slate-600 hover:bg-slate-100 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">notifications</span>
                        <span
                            class="absolute top-2 right-2 h-2.5 w-2.5 rounded-full bg-red-500 border-2 border-white"></span>
                    </button>
                    <div class="h-10 w-10 rounded-full bg-slate-200 bg-cover bg-center"
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD3f6TgcilXJG5olVoR0T_EVRXYTj85n0Oq4lBrrweQhWkdzUKrgGBZXFjLPzhG2sbAaCpUYMEtJi7ZMGnDv1jXtKMYwFkZrq4zYT5FSvc9dtvsVvds2MycnB0jw2Yj0VU6nui_dEw1_NlCJYjIgMqIdgszmX_H-r56m_p_rb97YuUmjjTKIT4ieZ95MAIQBZL5PS6io2jWYVNMUxI-dfNvTjGUoLe-FrtVWTtN7p-r7NiuOvixffFfSAEr5D-WBm3Occ_nv6WdHguf');">
                    </div>
                </div>
            </header>

            <div class="flex-1 p-8">
                <div class="mx-auto max-w-6xl space-y-8">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-900">Medical History</h1>
                        <p class="text-slate-500 mt-1">A complete record of your past tests, consultations, and
                            procedures.</p>
                    </div>

                    <!-- Records Table -->
                    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-slate-600">
                                <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                                    <tr>
                                        <th class="px-6 py-3 font-semibold" scope="col">Date</th>
                                        <th class="px-6 py-3 font-semibold" scope="col">Test / Procedure</th>
                                        <th class="px-6 py-3 font-semibold" scope="col">Doctor</th>
                                        <th class="px-6 py-3 font-semibold" scope="col">Facility</th>
                                        <th class="px-6 py-3 font-semibold" scope="col">Status</th>
                                        <th class="px-6 py-3 text-right font-semibold" scope="col">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="records-tbody" class="divide-y divide-slate-100">
                                    <!-- Records will be populated here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const raw = localStorage.getItem('mediora_user');
            if (!raw) { window.location.href = '/login.html'; return; }

            // Parse user from localStorage
            const user = JSON.parse(raw);
            const userId = user.id || 'user1'; // Default to user1 if not set

            // Logout button handler
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('mediora_user');
                window.location.href = '/login.html';
            });

            // Fetch and populate medical records
            try {
                console.log(`Fetching records for userId: ${userId}`);
                const response = await fetch(`/api/records/${userId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Records API response:', data);

                const tbody = document.getElementById('records-tbody');
                tbody.innerHTML = ''; // Clear existing content

                if (!data.records || data.records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-slate-500">No medical records found.</td></tr>';
                    return;
                }

                // Render each record as a table row
                data.records.forEach((record) => {
                    const statusClass = record.status === 'Archived' 
                        ? 'bg-slate-100 text-slate-600' 
                        : 'bg-green-50 text-green-700';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-50/50 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-slate-900">${record.date}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-slate-400 text-lg">${record.icon || 'description'}</span>
                                ${record.type}
                            </div>
                        </td>
                        <td class="px-6 py-4">${record.doctor}</td>
                        <td class="px-6 py-4">${record.facility}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${statusClass}">
                                ${record.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="/record-detail.html?id=${record.id}" class="inline-flex items-center gap-1 text-primary hover:text-blue-700 font-medium">
                                View
                                <span class="material-symbols-outlined text-sm">arrow_forward</span>
                            </a>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error('Error fetching records:', error);
                const tbody = document.getElementById('records-tbody');
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Error loading records: ${error.message}</td></tr>`;
            }
        });
    </script>
</body>

</html>
