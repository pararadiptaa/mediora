server {
    listen 80;
    server_name localhost;

    # Serve the static frontend
    location / {
        root   /usr/share/nginx/html;
        index  login.html;
        try_files $uri $uri/ /login.html;
    }

    # Proxy: Appointment API (Node.js)
    location /api/appointments/ {
        proxy_pass         http://appointment-api:3001;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-User-ID $http_x_user_id;
        # Forward W3C Trace Context headers
        proxy_set_header   traceparent $http_traceparent;
        proxy_set_header   tracestate $http_tracestate;
    }

    # Proxy: Billing API (Golang)
    location /api/billing/ {
        proxy_pass         http://billing-api:3002;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-User-ID $http_x_user_id;
        # Forward W3C Trace Context headers
        proxy_set_header   traceparent $http_traceparent;
        proxy_set_header   tracestate $http_tracestate;
    }

    # Proxy: Validation API (Node.js)
    location /api/validate {
        proxy_pass         http://validation-api:3003;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-User-ID $http_x_user_id;
        # Forward W3C Trace Context headers
        proxy_set_header   traceparent $http_traceparent;
        proxy_set_header   tracestate $http_tracestate;
    }

    # Proxy: Records API (Node.js)
    location /api/records {
        proxy_pass         http://records-api:3004;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-User-ID $http_x_user_id;
        # Forward W3C Trace Context headers
        proxy_set_header   traceparent $http_traceparent;
        proxy_set_header   tracestate $http_tracestate;
    }
}
