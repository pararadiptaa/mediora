services:
  # ── PostgreSQL Database ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mediora-postgres
    environment:
      POSTGRES_USER: mediora
      POSTGRES_PASSWORD: mediora_pass
      POSTGRES_DB: mediora_db
    volumes:
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs:
      - /var/lib/postgresql/data
      # tmpfs = RAM-disk, always empty on container start/restart.
      # Guarantees init.sql runs every time, keeping schema in sync.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediora -d mediora_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (Nginx reverse proxy + static HTML) ────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mediora-frontend
    ports:
      - "8080:80"
    depends_on:
      - appointment-api
      - billing-api
      - validation-api
      - records-api
    restart: unless-stopped

  # ── Appointment API (Node.js / Express) ─────────────────────────────
  appointment-api:
    build:
      context: ./services/appointment
      dockerfile: Dockerfile
    container_name: mediora-appointment-api
    environment:
      PORT: "3001"
      SERVICE_NAME: "appointment-api"
      DELAY_MIN: "100"
      DELAY_MAX: "500"
      BILLING_API_URL: "http://billing-api:3002"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "mediora"
      DB_PASSWORD: "mediora_pass"
      DB_NAME: "mediora_db"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      # ── Chaos Engineering ──
      MEDIORA_PROBLEMS: "SlowDatabaseQuery,CpuSpike"
      CHAOS_DELAY_SECONDS: "120"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      billing-api:
        condition: service_started
    restart: unless-stopped

  # ── Billing API (Golang / Gin) ──────────────────────────────────────
  billing-api:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    container_name: mediora-billing-api
    environment:
      PORT: "3002"
      SERVICE_NAME: "billing-api"
      VALIDATION_API_URL: "http://validation-api:3003"
      # ── Database Configuration ──
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "mediora"
      DB_PASSWORD: "mediora_pass"
      DB_NAME: "mediora_db"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
      DT_TAGS: "project:mediora,language:golang,mode:native"
      # ── Chaos Engineering ──
      MEDIORA_PROBLEMS: "Billing500"
      CHAOS_DELAY_SECONDS: "120"
    expose:
      - "3002"
    depends_on:
      postgres:
        condition: service_healthy
      validation-api:
        condition: service_started
    restart: unless-stopped

  # ── Validation API (Node.js / Express) ──────────────────────────────
  validation-api:
    build:
      context: ./services/validation
      dockerfile: Dockerfile
    container_name: mediora-validation-api
    environment:
      PORT: "3003"
      SERVICE_NAME: "validation-api"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
    expose:
      - "3003"
    restart: unless-stopped

  # ── Records API (Node.js / Express) ─────────────────────────────────
  records-api:
    build:
      context: ./services/records
      dockerfile: Dockerfile
    container_name: mediora-records-api
    environment:
      PORT: "3004"
      SERVICE_NAME: "records-api"
      # ── Database Configuration ──
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "mediora"
      DB_PASSWORD: "mediora_pass"
      DB_NAME: "mediora_db"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
    expose:
      - "3004"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Loadgen Bot (Playwright) ────────────────────────────────────────
  loadgen:
    build:
      context: ./loadgen
      dockerfile: Dockerfile
    container_name: mediora-loadgen
    environment:
      BASE_URL: "http://frontend:80"
      LOADGEN_VPM: "2"
    depends_on:
      - frontend
      - appointment-api
      - billing-api
      - validation-api
      - records-api
    restart: unless-stopped

