version: "3.8"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mediora-postgres
    environment:
      POSTGRES_USER: mediora
      POSTGRES_PASSWORD: mediora_pass
      POSTGRES_DB: mediora_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediora -d mediora_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (Nginx reverse proxy + static HTML) ────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mediora-frontend
    ports:
      - "8080:80"
    depends_on:
      - appointment-api
      - billing-api
    restart: unless-stopped

  # ── Appointment API (Node.js / Express) ─────────────────────────────
  appointment-api:
    build:
      context: ./services/appointment
      dockerfile: Dockerfile
    container_name: mediora-appointment-api
    environment:
      PORT: "3001"
      SERVICE_NAME: "appointment-api"
      DELAY_MIN: "100"
      DELAY_MAX: "500"
      BILLING_API_URL: "http://billing-api:3002"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "mediora"
      DB_PASSWORD: "mediora_pass"
      DB_NAME: "mediora_db"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      # ── Chaos Engineering ──
      MEDIORA_PROBLEMS: "SlowDatabaseQuery,CpuSpike"
      CHAOS_DELAY_SECONDS: "120"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      billing-api:
        condition: service_started
    restart: unless-stopped

  # ── Billing API (Python / Flask) ────────────────────────────────────
  billing-api:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    container_name: mediora-billing-api
    environment:
      PORT: "3002"
      SERVICE_NAME: "billing-api"
      DELAY_MIN: "100"
      DELAY_MAX: "500"
      FAILURE_RATE: "0.3"
      OTEL_SERVICE_NAME: "billing-api"
      OTEL_TRACES_EXPORTER: "none"
      OTEL_PYTHON_FLASK_EXCLUDED_URLS: "health"
      # ── APM Tracing (W3C Config) ──
      DT_PROPAGATION_HEADERS: "w3c,tracecontext"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      OTEL_PYTHON_ID_GENERATOR: "xray"
      DT_TAGS: "project:mediora,service:billing"
      DT_CUSTOM_PROP: "app_stage:demo"
      # ── Chaos Engineering ──
      MEDIORA_PROBLEMS: "Billing500"
      CHAOS_DELAY_SECONDS: "120"
    expose:
      - "3002"
    restart: unless-stopped

  # ── Loadgen Bot (Playwright) ────────────────────────────────────────
  loadgen:
    build:
      context: ./loadgen
      dockerfile: Dockerfile
    container_name: mediora-loadgen
    environment:
      BASE_URL: "http://frontend:80"
      LOADGEN_VPM: "2"
    depends_on:
      - frontend
      - appointment-api
      - billing-api
    restart: unless-stopped

volumes:
  pgdata:
